name: Playwright Tests

on:
  pull_request:
    branches: [main]

env:
  # Run against the PR's Cloudflare preview deploy.
  URL: "https://preview-${{ github.event.number }}.staging.documentcloud.org"
  NODE_ENV: staging
  # Login is initiated on the staging API host, which hands off to Squarelet.
  DC_API_URL: "https://api.staging.documentcloud.org"
  # Credentials for the authenticated test account. If these secrets are unset,
  # the auth setup skips and the authenticated tests don't run.
  DC_TEST_USERNAME: ${{ secrets.DC_TEST_USERNAME }}
  DC_TEST_PASSWORD: ${{ secrets.DC_TEST_PASSWORD }}

jobs:
  wait:
    runs-on: ubuntu-latest

    steps:
      - uses: cygnetdigital/wait_for_response@v2.0.0
        with:
          url: ${{ env.URL }}
          responseCode: "200"
          timeout: 120000
          interval: 3000

  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    needs: wait

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: "22.x"

      - name: Install dependencies
        run: npm ci
      - run: npm run sync

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
