name: Playwright Tests

on:
  pull_request:
    branches: [main]

env:
  # Run against the PR's Cloudflare preview deploy.
  URL: "https://preview-${{ github.event.number }}.staging.documentcloud.org"
  NODE_ENV: staging
  # Login is initiated on the staging API host, which hands off to Squarelet.
  DC_API_URL: "https://api.staging.documentcloud.org"
  # Credentials for the authenticated test account. If these secrets are unset,
  # the auth setup skips and the authenticated tests don't run.
  DC_TEST_USERNAME: ${{ secrets.DC_TEST_USERNAME }}
  DC_TEST_PASSWORD: ${{ secrets.DC_TEST_PASSWORD }}

jobs:
  wait:
    runs-on: ubuntu-latest

    steps:
      - uses: nev7n/wait_for_response@v1.2.0
        with:
          # `/` redirects (307) to `/home/`; poll the page that returns 200.
          # The preview deploy runs in parallel, so allow time for it to finish
          # and for the Cloudflare custom domain to come up.
          url: ${{ env.URL }}/home/
          responseCode: "200"
          timeout: 300000
          interval: 5000

  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    needs: wait

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: "22.x"

      - name: Set up WireGuard Connection
        uses: niklaskeerl/easy-wireguard-action@v2
        with:
          WG_CONFIG_FILE: ${{ secrets.WG_CONFIG_FILE }}

      - name: Verify staging Squarelet is reachable over the VPN
        run: |
          curl --fail --show-error --silent --location \
            --retry 5 --retry-delay 5 --retry-all-errors \
            --output /dev/null \
            --write-out 'Squarelet responded: HTTP %{http_code} in %{time_total}s\n' \
            "${{ secrets.SQUARELET_STAGING_URL }}"

      - name: Verify staging API login is not blocked by Cloudflare
        run: |
          # The auth flow starts here, then redirects to Squarelet. A normal
          # response is a 3xx redirect; a Cloudflare WAF block is a 403. Don't
          # follow redirects (-L would chase off to Squarelet); --fail turns a
          # 403/block into a clear, fast failure before Playwright runs.
          curl --fail --show-error --silent \
            --retry 5 --retry-delay 5 --retry-all-errors \
            --output /dev/null \
            --write-out 'API login responded: HTTP %{http_code} in %{time_total}s\n' \
            "${DC_API_URL}/accounts/login/squarelet"

      - name: Install dependencies
        run: npm ci
      - run: npm run sync

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
