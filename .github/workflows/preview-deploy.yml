name: Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  NODE_ENV: staging
  PUBLIC_ENV: staging
  PUBLIC_EMBED_MAX_AGE: "400"
  PUBLIC_PAGE_MAX_AGE: "401"
  PUBLIC_VIEWER_MAX_AGE: "402"
  PR_NUMBER: ${{ github.event.pull_request.number }}

jobs:
  deploy:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate preview wrangler config
        run: bash scripts/generate-preview-wrangler.sh "dc-preview-${PR_NUMBER}" "preview-${PR_NUMBER}"

      - name: Build
        run: npm run build
        env:
          APP_URL: https://preview-${{ env.PR_NUMBER }}.staging.documentcloud.org

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config wrangler.preview.jsonc

      - name: Comment preview URL
        uses: actions/github-script@v9
        with:
          script: |
            const previewUrl = `https://preview-${process.env.PR_NUMBER}.staging.documentcloud.org`;
            const body = `Preview deployed: ${previewUrl}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Preview deployed:')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      # Delete via the REST API, not `wrangler delete`: wrangler enumerates KV
      # namespaces (needs a KV read scope the deploy token lacks), which our
      # Assets-based previews don't use anyway.
      - name: Delete preview worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          response=$(curl --silent --show-error --write-out '\n%{http_code}' \
            -X DELETE \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts/dc-preview-${PR_NUMBER}?force=true" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")
          http_code=$(printf '%s' "$response" | tail -n1)
          body=$(printf '%s' "$response" | sed '$d')
          echo "$body"
          if [ "$http_code" = "200" ]; then
            echo "Deleted worker dc-preview-${PR_NUMBER}"
          elif [ "$http_code" = "404" ]; then
            echo "Worker dc-preview-${PR_NUMBER} not found; nothing to delete"
          else
            echo "Delete failed (HTTP ${http_code})"
            exit 1
          fi

      - name: Comment cleanup
        uses: actions/github-script@v9
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Preview deployed:')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: 'Preview removed.',
              });
            }
